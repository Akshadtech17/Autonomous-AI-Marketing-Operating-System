databases:
  - name: lost-in-frame-db
    plan: free
    databaseName: lif_production
    user: lif_user

services:
  - type: web
    name: lost-in-frame-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lost-in-frame-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
      - key: MAX_RETRIES
        value: "2"
      - key: LOG_LEVEL
        value: INFO
